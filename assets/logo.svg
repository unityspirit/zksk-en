<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gz" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A94B"/>
      <stop offset="100%" stop-color="#b8912f"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#1a1a2e"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#gz)" stroke-width="2"/>
  <!-- High-rise building 1 -->
  <rect x="55" y="55" width="25" height="95" fill="none" stroke="url(#gz)" stroke-width="2.5" rx="2"/>
  <!-- Windows for building 1 -->
  <rect x="60" y="62" width="6" height="6" fill="url(#gz)" rx="1"/>
  <rect x="69" y="62" width="6" height="6" fill="url(#gz)" rx="1"/>
  <rect x="60" y="75" width="6" height="6" fill="url(#gz)" rx="1"/>
  <rect x="69" y="75" width="6" height="6" fill="url(#gz)" rx="1"/>
  <rect x="60" y="88" width="6" height="6" fill="url(#gz)" rx="1"/>
  <rect x="69" y="88" width="6" height="6" fill="url(#gz)" rx="1"/>
  <!-- High-rise building 2 (taller) -->
  <rect x="85" y="40" width="30" height="110" fill="none" stroke="url(#gz)" stroke-width="2.5" rx="2"/>
  <!-- Windows for building 2 -->
  <rect x="91" y="48" width="7" height="7" fill="url(#gz)" rx="1"/>
  <rect x="102" y="48" width="7" height="7" fill="url(#gz)" rx="1"/>
  <rect x="91" y="62" width="7" height="7" fill="url(#gz)" rx="1"/>
  <rect x="102" y="62" width="7" height="7" fill="url(#gz)" rx="1"/>
  <rect x="91" y="76" width="7" height="7" fill="url(#gz)" rx="1"/>
  <rect x="102" y="76" width="7" height="7" fill="url(#gz)" rx="1"/>
  <rect x="91" y="90" width="7" height="7" fill="url(#gz)" rx="1"/>
  <rect x="102" y="90" width="7" height="7" fill="url(#gz)" rx="1"/>
  <!-- Building 3 (shorter) -->
  <rect x="120" y="70" width="25" height="80" fill="none" stroke="url(#gz)" stroke-width="2.5" rx="2"/>
  <rect x="125" y="78" width="6" height="6" fill="url(#gz)" rx="1"/>
  <rect x="134" y="78" width="6" height="6" fill="url(#gz)" rx="1"/>
  <rect x="125" y="91" width="6" height="6" fill="url(#gz)" rx="1"/>
  <rect x="134" y="91" width="6" height="6" fill="url(#gz)" rx="1"/>
  <!-- Ground line -->
  <line x1="40" y1="150" x2="160" y2="150" stroke="url(#gz)" stroke-width="2" stroke-linecap="round"/>
</svg>
